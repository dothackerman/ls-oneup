name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: Type DEPLOY_PRODUCTION to continue
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy worker and assets
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate branch and confirmation
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Production deploy only allowed from main."
            exit 1
          fi
          if [ "${{ github.event.inputs.confirm_deploy }}" != "DEPLOY_PRODUCTION" ]; then
            echo "Invalid confirmation token."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build
        run: |
          npm run typecheck
          npm run build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.production.jsonc
