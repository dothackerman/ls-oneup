name: Migrate Production D1

on:
  workflow_dispatch:
    inputs:
      confirm_migration:
        description: Type MIGRATE_PRODUCTION to continue
        required: true
        type: string
      allow_destructive_migrations:
        description: Set true only when intentionally applying destructive SQL migrations
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: migrate-production
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply production migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate branch and confirmation
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Production migrations only allowed from main."
            exit 1
          fi
          if [ "${{ github.event.inputs.confirm_migration }}" != "MIGRATE_PRODUCTION" ]; then
            echo "Invalid confirmation token."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: List pending production migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations list ls-oneup-db --remote --config wrangler.production.jsonc

      - name: Check for destructive SQL
        run: |
          node -e '
          const fs = require("node:fs");
          const path = require("node:path");
          const allow = String(process.env.ALLOW_DESTRUCTIVE_MIGRATIONS || "false") === "true";
          if (allow) {
            process.exit(0);
          }
          const destructiveSqlPattern = /\b(drop\s+table|drop\s+index|truncate\s+table|delete\s+from|alter\s+table[\s\S]{0,80}\sdrop\s+(column|constraint))\b/i;
          const dir = path.join(process.cwd(), "migrations");
          const files = fs.readdirSync(dir).filter((name) => name.endsWith(".sql")).sort();
          const hits = files.filter((name) => destructiveSqlPattern.test(fs.readFileSync(path.join(dir, name), "utf8")));
          if (hits.length > 0) {
            console.error(`Potentially destructive SQL detected in: ${hits.join(", ")}. Set allow_destructive_migrations=true to proceed intentionally.`);
            process.exit(1);
          }
          '
        env:
          ALLOW_DESTRUCTIVE_MIGRATIONS: ${{ github.event.inputs.allow_destructive_migrations }}

      - name: Apply production migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply ls-oneup-db --remote --config wrangler.production.jsonc

      - name: Upload wrangler logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-logs
          path: ~/.config/.wrangler/logs/
          if-no-files-found: ignore
